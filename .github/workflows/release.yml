name: Release

# On a tag matching v*, build .deb / .rpm / .AppImage for amd64 and arm64
# (6 artifacts total) and attach them to the GitHub Release.
#
# Build container: per-arch, oldest glibc that has a matching PyQt6 wheel.
#   amd64: ubuntu:22.04 (glibc 2.35) — PyQt6 6.8.1 x86_64 wheel is
#     manylinux_2_28 (glibc 2.28+). Bundles run on Ubuntu 22.04+, Debian 12+,
#     Fedora 37+, RHEL 9+, openSUSE Leap 15.5+.
#   arm64: ubuntu:24.04 (glibc 2.39) — PyQt6 6.8.1 aarch64 wheel is
#     manylinux_2_39 (glibc 2.39+); no older-glibc arm64 wheel exists on PyPI.
#     ubuntu:24.04 ships Python 3.12 natively (no deadsnakes needed).
#     Bundles run on Ubuntu 24.04+, Debian 13+, Fedora 40+.
# Arm64: native ubuntu-24.04-arm runner (no QEMU — faster, native wheels).

on:
  push:
    tags: ["v*"]
  # Allow manual runs from the Actions tab for testing the pipeline without
  # cutting a real release tag.
  workflow_dispatch:

permissions:
  contents: write   # needed to attach files to a GitHub Release

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            container: ubuntu:22.04
          - arch: arm64
            runner: ubuntu-24.04-arm
            container: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      # The containers' default user is root, which breaks actions/checkout's
      # permission model. The checkout action handles this, but be aware.
      - uses: actions/checkout@v4

      - name: Install build prerequisites (amd64 / ubuntu:22.04)
        if: matrix.arch == 'amd64'
        run: |
          apt-get update
          # ubuntu:22.04 ships Python 3.10; we need 3.12+. Use deadsnakes.
          apt-get install -y ca-certificates curl gnupg software-properties-common
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y \
              python3.12 python3.12-venv python3.12-dev \
              python3-dbus python3-gi \
              libsbc1 libsndfile1 \
              imagemagick gzip \
              ruby gcc g++ pkg-config git
          # fpm (Ruby gem) — the .deb/.rpm packager.
          gem install --no-document fpm

      - name: Install build prerequisites (arm64 / ubuntu:24.04)
        if: matrix.arch == 'arm64'
        run: |
          apt-get update
          # ubuntu:24.04 ships Python 3.12 natively — no deadsnakes needed.
          apt-get install -y \
              python3 python3-venv python3-dev \
              python3-dbus python3-gi \
              libsbc1 libsndfile1 \
              imagemagick gzip \
              ruby gcc g++ pkg-config git
          # fpm (Ruby gem) — the .deb/.rpm packager.
          gem install --no-document fpm

      - name: Make python3.12 the default python3 (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
          python3 --version

      - name: Build all three package formats
        run: bash packaging/build.sh deb rpm appimage

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp dist/uvprotermbt-*.deb artifacts/ 2>/dev/null || true
          cp dist/uvprotermbt-*.rpm artifacts/ 2>/dev/null || true
          cp dist/uvprotermbt-*.AppImage artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uvprotermbt-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish to GitHub Release
    needs: [build]
    runs-on: ubuntu-24.04
    # Only publish on real tag pushes; workflow_dispatch just builds + uploads
    # artifacts for inspection without cutting a release.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show artifacts
        run: ls -la artifacts/

      - name: Create / update Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
